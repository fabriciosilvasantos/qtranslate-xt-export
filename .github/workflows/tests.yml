name: Tests

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  phpunit:
    name: PHPUnit Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run unit tests
        run: ./vendor/bin/phpunit --configuration phpunit.xml.dist

      - name: Run integration tests
        run: ./vendor/bin/phpunit --configuration phpunit-integration.xml.dist

  phpstan:
    name: PHPStan Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run PHPStan
        run: ./vendor/bin/phpstan analyse -c phpstan.neon.dist --memory-limit=2G --no-progress

  phpcs:
    name: PHPCS Code Style
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction

      - name: Run PHPCS
        run: ./vendor/bin/phpcs --standard=phpcs.xml.dist
